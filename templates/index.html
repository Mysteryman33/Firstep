<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AI Cofounder</title>
<meta name="description" content="Sign in to your AI Cofounder workspace.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #050505;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* ── Animated background ── */
.bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: #050505;
    overflow: hidden;
}

.bg::before {
    content: '';
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,80,255,0.12) 0%, transparent 70%);
    top: -200px;
    left: -200px;
    animation: drift1 12s ease-in-out infinite alternate;
}

.bg::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,90,120,0.08) 0%, transparent 70%);
    bottom: -150px;
    right: -150px;
    animation: drift2 15s ease-in-out infinite alternate;
}

@keyframes drift1 {
    from { transform: translate(0, 0); }
    to   { transform: translate(60px, 60px); }
}
@keyframes drift2 {
    from { transform: translate(0, 0); }
    to   { transform: translate(-40px, -40px); }
}

/* ── Card ── */
.card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    margin: 24px;
    padding: 48px 40px;
    border-radius: 28px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ── Logo ── */
.logo {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #2a2a2a, #111);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    margin-bottom: 28px;
}

/* ── Headings ── */
.card h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.6px;
    margin-bottom: 6px;
}

.card .subtitle {
    color: #6b6b6b;
    font-size: 14px;
    margin-bottom: 36px;
}

/* ── Tabs (Sign In / Sign Up) ── */
.tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 30px;
}

.tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: #666;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
}

.tab-btn.active {
    background: rgba(255,255,255,0.1);
    color: white;
}

/* ── Form ── */
.form-group {
    margin-bottom: 16px;
}

label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
}

input[type="email"],
input[type="password"],
input[type="text"] {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: white;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
}

input[type="email"]:focus,
input[type="password"]:focus,
input[type="text"]:focus {
    border-color: rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.07);
}

input::placeholder {
    color: #444;
}

/* ── Submit button ── */
.btn-primary {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    border-radius: 14px;
    border: none;
    background: white;
    color: black;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
}

.btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-2px);
}

.btn-primary:active {
    transform: translateY(0);
}

/* ── Divider ── */
.divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: #444;
    font-size: 12px;
}

.divider::before,
.divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.07);
}

/* ── Google OAuth placeholder ── */
.btn-google {
    width: 100%;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, border-color 0.2s;
}

.btn-google:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.16);
}

.btn-google svg {
    width: 18px;
    height: 18px;
}

/* ── Error / success banner ── */
.banner {
    display: none;
    padding: 11px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 18px;
    font-weight: 500;
}

.banner.error {
    background: rgba(255,60,60,0.12);
    border: 1px solid rgba(255,60,60,0.25);
    color: #ff7070;
}

.banner.success {
    background: rgba(60,220,120,0.1);
    border: 1px solid rgba(60,220,120,0.22);
    color: #5ddb96;
}

/* ── Forgot password link ── */
.forgot {
    text-align: right;
    margin-bottom: 4px;
}

.forgot a {
    font-size: 12px;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
}

.forgot a:hover {
    color: #999;
}

/* ── Spinner ── */
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: black;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="bg"></div>

<div class="card">

    <div class="logo">✦</div>

    <h1>AI Cofounder</h1>
    <p class="subtitle">Your startup partner, always on.</p>

    <!-- Sign In / Sign Up tabs -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Banner -->
    <div class="banner" id="banner"></div>

    <!-- Sign In Form -->
    <form id="form-signin" onsubmit="handleSubmit(event, 'signin')">
        <div class="form-group">
            <label for="signin-email">Email</label>
            <input type="email" id="signin-email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
        <button type="submit" class="btn-primary" id="btn-signin">Sign In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="form-signup" style="display:none" onsubmit="handleSubmit(event, 'signup')">
        <div class="form-group">
            <label for="signup-name">Full Name</label>
            <input type="text" id="signup-name" name="name" placeholder="Jane Smith" required autocomplete="name">
        </div>
        <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" name="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary" id="btn-signup">Create Account</button>
    </form>

    <!-- Divider + Google -->
    <div class="divider">or continue with</div>

    <button class="btn-google" onclick="alert('Google OAuth coming soon!')">
        <!-- Google icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
    </button>

</div>

<script>
function switchTab(tab) {
    const signin = document.getElementById('form-signin');
    const signup = document.getElementById('form-signup');
    const tabSignin = document.getElementById('tab-signin');
    const tabSignup = document.getElementById('tab-signup');
    hideBanner();

    if (tab === 'signin') {
        signin.style.display = '';
        signup.style.display = 'none';
        tabSignin.classList.add('active');
        tabSignup.classList.remove('active');
    } else {
        signin.style.display = 'none';
        signup.style.display = '';
        tabSignin.classList.remove('active');
        tabSignup.classList.add('active');
    }
}

function showBanner(msg, type) {
    const b = document.getElementById('banner');
    b.textContent = msg;
    b.className = 'banner ' + type;
    b.style.display = 'block';
}

function hideBanner() {
    const b = document.getElementById('banner');
    b.style.display = 'none';
}

function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Please wait…';
    } else {
        btn.disabled = false;
        btn.textContent = btnId === 'btn-signin' ? 'Sign In' : 'Create Account';
    }
}

async function handleSubmit(e, type) {
    e.preventDefault();
    hideBanner();

    const btnId = type === 'signin' ? 'btn-signin' : 'btn-signup';
    setLoading(btnId, true);

    const payload = type === 'signin'
        ? {
            email: document.getElementById('signin-email').value.trim(),
            password: document.getElementById('signin-password').value
          }
        : {
            name: document.getElementById('signup-name').value.trim(),
            email: document.getElementById('signup-email').value.trim(),
            password: document.getElementById('signup-password').value
          };

    try {
        const res = await fetch(`/auth/${type}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok && data.ok) {
            showBanner(type === 'signin' ? 'Welcome back! Redirecting…' : 'Account created! Redirecting…', 'success');
            setTimeout(() => { window.location.href = '/dashboard'; }, 800);
        } else {
            showBanner(data.error || 'Something went wrong.', 'error');
            setLoading(btnId, false);
        }
    } catch {
        showBanner('Network error — please try again.', 'error');
        setLoading(btnId, false);
    }
}
</script>

</body>
</html>
